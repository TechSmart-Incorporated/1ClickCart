# ── Site: <your-second-site> ─────────────────────────────────────────────────
# Duplicate this file for each additional static site.
# Steps:
#   1. Rename this file (e.g. dashboard.conf)
#   2. Set server_name to the site's domain
#   3. Set root to the site's dist folder under /usr/share/nginx/html/
#   4. Add a build stage + COPY in the Dockerfile for that site's source

server {
    listen 80;
    server_name site2.example.com;           # <-- change this

    root /usr/share/nginx/html/site2;        # <-- change this
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hashed assets
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|webp|avif|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html — never cache
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # SPA fallback (remove if this site is NOT a SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
