<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <defs>
    <!-- Radial glow: teal centre fading to dark navy edges -->
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#0e5c6e" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#040c14" stop-opacity="1"/>
    </radialGradient>

    <!-- Gradient for 3D top-face highlight on each diamond -->
    <linearGradient id="topFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1e4a60" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0c2a3a" stop-opacity="1"/>
    </linearGradient>

    <!-- Gradient for 3D bottom-face shadow -->
    <linearGradient id="botFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0c2a3a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#060f18" stop-opacity="1"/>
    </linearGradient>

    <!--
      Tile: 80 × 48 px
      Centre diamond vertices: (40,0) (80,24) (40,48) (0,24)
      Split into top half and bottom half for the 3D cube look.
    -->
    <pattern id="diamonds" x="0" y="0" width="80" height="48" patternUnits="userSpaceOnUse">
      <!-- Tile background -->
      <rect width="80" height="48" fill="#0a1c2a"/>

      <!-- Top half of centre diamond (lighter) -->
      <polygon points="40,1 79,24 40,24 1,24" fill="url(#topFace)"/>
      <!-- Bottom half of centre diamond (darker) -->
      <polygon points="40,24 79,24 40,47 1,24" fill="url(#botFace)"/>

      <!-- Thin stroke around the full diamond for definition -->
      <polygon
        points="40,1 79,24 40,47 1,24"
        fill="none"
        stroke="#1e4a60"
        stroke-width="0.6"
        stroke-opacity="0.5"
      />

      <!--
        Corner diamonds (quarter-diamonds at each corner that together
        form a full diamond between tiles)
      -->
      <!-- Top-left corner: bottom-right quarter -->
      <polygon points="0,0 40,0 0,24"   fill="url(#topFace)"/>
      <!-- Top-right corner: bottom-left quarter -->
      <polygon points="80,0 80,24 40,0" fill="url(#topFace)"/>
      <!-- Bottom-left corner: top-right quarter -->
      <polygon points="0,24 40,48 0,48"  fill="url(#botFace)"/>
      <!-- Bottom-right corner: top-left quarter -->
      <polygon points="80,24 80,48 40,48" fill="url(#botFace)"/>
    </pattern>
  </defs>

  <!-- Diamond tile layer -->
  <rect width="100%" height="100%" fill="url(#diamonds)"/>
  <!-- Radial glow overlay -->
  <rect width="100%" height="100%" fill="url(#glow)"/>
</svg>
